<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px 20px; }
        .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        
        .submit-btn { background-color: #28a745; color: white; }
        .reset-btn { background-color: #6c757d; color: white; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #statusMessage { 
            text-align: center; 
            margin-top: 15px; 
            color: #28a745; 
            font-weight: bold; 
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1> Nikhil Shyama DAV Public School,Dumra,Sitamahri</h1>
<h2>Student Registration</h2>
    <form id="registrationForm">
        <div class="form-group">
            <label>Registration No.</label>
            <input type="text" name="reg_no" required>
        </div>
        <div class="form-group">
            <label>Student's Name</label>
            <input type="text" name="student_name" required>
        </div>
        <div class="form-group">
            <label>Father's Name</label>
            <input type="text" name="father_name" required>
        </div>
        <div class="form-group">
            <label>DOB (dd.mm.yyyy)</label>
            <input type="text" name="dob" placeholder="31.12.2005" pattern="\d{2}\.\d{2}\.\d{4}" required>
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" name="mobile" pattern="[0-9]{10}" required>
        </div>
        
        <div class="button-group">
            <button type="reset" class="reset-btn">Reset</button>
            <button type="submit" class="submit-btn" id="submitBtn">Submit</button>
        </div>
        <div id="statusMessage">? Data saved & form reset!</div>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzJdv_9Tas8iz7FE-hilPSgHwYs1baBaCTZLDN7ULUbRv0ZchR2feft-bwohGp3gxJ39w/exec';
    const form = document.getElementById('registrationForm');
    const statusMsg = document.getElementById('statusMessage');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // 1. Visual feedback that it's working
        submitBtn.disabled = true;
        submitBtn.innerHTML = "Processing...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                // 2. Clear the form immediately
                form.reset(); 
                
                // 3. Show the success text
                statusMsg.style.display = "block";
                
                // 4. Reset the button
                submitBtn.disabled = false;
                submitBtn.innerHTML = "Submit";

                // 5. Hide the success text after 4 seconds
                setTimeout(() => {
                    statusMsg.style.display = "none";
                }, 4000);
            })
            .catch(error => {
                console.error('Error!', error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = "Submit";
                alert("Something went wrong. Please try again.");
            });
    });
</script>

</body>
</html>
